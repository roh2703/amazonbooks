version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: ecomerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecomerce
      MYSQL_USER: root
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: ecomerce-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecomerce
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql
 
  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    container_name: ecomerce-frontend
    depends_on:
      - backend

volumes:
  mysql_data:
  

